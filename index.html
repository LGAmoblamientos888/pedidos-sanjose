<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiros San José</title>
    <style>
        /* 1. Definición global del tamaño A4 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
        }

        /* 2. Este contenedor obliga a iLovePDF a ver una hoja completa */
        .sheet {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            box-sizing: border-box;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        h1 { 
            font-size: 24pt; 
            margin: 0; 
            border-bottom: 2px solid black; 
        }

        .info-header { 
            font-size: 11pt; 
            margin-bottom: 30pt; 
            margin-top: 5pt; 
        }

        .lista { flex-grow: 1; }

        .fila { 
            border-bottom: 1px solid black; 
            padding: 10pt 0; 
            font-size: 13pt; 
            list-style: none;
        }

        /* 3. Footer fijo al final de la hoja A4 */
        .footer { 
            font-size: 9pt; 
            border-top: 1px solid black; 
            padding-top: 10pt; 
            margin-top: 20pt;
        }
    </style>
</head>
<body>
    <div class="sheet">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="info-header">
            <strong>DOCUMENTO DE CONTROL INTERNO</strong><br>
            Generado el: <span id="fecha"></span>
        </div>

        <div id="lista-contenedora" class="lista">
            </div>

        <div class="footer">
            LG Amoblamientos - Gestión de Logística Automática
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString();
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (rawData) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(rawData).split(',');
            pedidos.forEach(pedido => {
                const div = document.createElement('div');
                div.className = 'fila';
                div.textContent = pedido;
                contenedor.appendChild(div);
            });
        }
    </script>
</body>
</html>
