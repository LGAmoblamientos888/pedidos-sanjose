<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Forzamos el tamaño de papel A4 a nivel de sistema de impresión */
        @page { 
            size: A4; 
            margin: 10mm; /* Margen físico para la impresora */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            width: 190mm; /* Ancho disponible real */
            font-family: 'Helvetica', Arial, sans-serif;
            background: #fff;
            color: #000;
        }

        .header {
            border-bottom: 3pt solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 26pt; font-weight: 900; }

        /* Estilo de lista para que iLovePDF no se maree con el ancho */
        ul { 
            list-style: none; 
            width: 100%;
        }

        li {
            font-family: 'Courier New', monospace;
            font-size: 16pt;
            font-weight: bold;
            padding: 15px 0;
            border-bottom: 1px solid #000;
            display: block;
            width: 100%;
            /* Evita que un item se corte entre dos páginas */
            page-break-inside: avoid; 
        }

        .footer {
            margin-top: 30px;
            font-size: 10pt;
            text-align: center;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RETIROS SAN JOSÉ</h1>
    </div>

    <div id="content">
        </div>

    <div class="footer">
        LG Amoblamientos - Control de Logística
    </div>

    <script>
        // Inyección instantánea
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            document.getElementById('content').innerHTML = decodeURIComponent(data);
        }
    </script>
</body>
</html>
