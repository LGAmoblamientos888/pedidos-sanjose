<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fff;
            font-family: Arial, sans-serif;
            /* Forzamos el centrado del bloque en el PDF */
            display: flex;
            justify-content: center;
        }

        .hoja {
            /* Definimos un ancho fijo de seguridad para A4 */
            width: 780px; 
            padding: 40px;
            min-height: 100vh;
        }

        h1 { 
            font-size: 28pt; 
            font-weight: bold;
            border-bottom: 6px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .pedido {
            font-family: 'Courier New', monospace;
            font-size: 16pt; /* Letra más grande para compensar el zoom */
            font-weight: bold;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
            /* Clave: obliga a que cada línea respete el ancho de 780px */
            display: block;
            width: 100%;
            word-wrap: break-word;
        }

        .footer {
            margin-top: 50px;
            border-top: 2px solid #000;
            padding-top: 15px;
            text-align: center;
            font-size: 12pt;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hoja">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="lista-pedidos">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            const items = decodeURIComponent(data).split('|');
            const container = document.getElementById('lista-pedidos');
            items.forEach(text => {
                if(text.trim()){
                    const div = document.createElement('div');
                    div.className = 'pedido';
                    div.textContent = text.trim();
                    container.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
