<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset para ocupar todo el espacio del conversor */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @page { size: A4; margin: 0; }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: #ffffff; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }

        /* El contenedor ocupa el 100% del ancho del 'navegador' de iLovePDF */
        .page-container {
            width: 100vw; 
            height: 100vh;
            padding: 40px; /* Margen estético para que no toque los bordes físicos */
            display: flex;
            flex-direction: column;
        }

        h1 { 
            font-size: 28pt; /* Aumentamos tamaño para que se vea profesional */
            border-bottom: 4px solid #000; 
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .meta-info { font-size: 14pt; margin-bottom: 40px; }

        .item-list { flex-grow: 1; }

        .row {
            font-family: 'Courier New', monospace;
            font-size: 16pt; /* Fuente más grande para lectura fácil en depósito */
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
            width: 100%;
        }

        .footer {
            border-top: 2px solid #000;
            padding-top: 15px;
            font-size: 12pt;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="meta-info">
            <strong>CONTROL DE LOGÍSTICA</strong> | Fecha: <span id="fecha"></span>
        </div>

        <div id="items" class="item-list"></div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        const list = document.getElementById('items');

        if (dataStr) {
            const lines = decodeURIComponent(dataStr).split(',');
            lines.forEach(line => {
                if(line.trim()){
                    const div = document.createElement('div');
                    div.className = 'row';
                    div.textContent = line.trim();
                    list.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
