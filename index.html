<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* No forzamos medidas de hoja, solo el comportamiento del texto */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            /* Evitamos que el navegador añada espacio extra al final */
            display: block;
        }

        .contenedor-flexible {
            /* Usamos un ancho menor (aprox 170mm) para que iLovePDF no lo vea "grande" */
            width: 85%; 
            margin: 0 auto; /* Centrado horizontal */
            padding-top: 40px; /* Margen superior visual */
            padding-bottom: 20px;
        }

        h1 { 
            font-size: 24pt; 
            font-weight: bold;
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .linea-pedido {
            font-family: 'Courier New', monospace;
            font-size: 13pt; /* Un poco más chico para asegurar que entre en una línea */
            font-weight: bold;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            /* Si el texto es muy largo, que baje de línea suavemente */
            word-wrap: break-word; 
        }

        .footer {
            margin-top: 40px;
            padding-top: 10px;
            border-top: 1px solid #000;
            text-align: center;
            font-size: 10pt;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="contenedor-flexible">
        <h1>RETIROS SAN JOSÉ</h1>
        <div id="lista-datos"></div>
        <div class="footer">
            LG AMOBLAMIENTOS - LOGÍSTICA
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            // Usamos la barra vertical | como separador para limpiar los datos
            const items = decodeURIComponent(data).split('|');
            const container = document.getElementById('lista-datos');
            items.forEach(texto => {
                if(texto.trim()){
                    const div = document.createElement('div');
                    div.className = 'linea-pedido';
                    div.textContent = texto.trim();
                    container.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
