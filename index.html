<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos CUALQUIER restricción de tamaño fijo */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            background: #ffffff; 
            font-family: 'Helvetica', Arial, sans-serif;
            color: #000;
        }

        /* Usamos un contenedor que se estire al máximo del navegador de iLovePDF */
        .wrapper {
            width: 100%;
            padding: 50px; /* Margen de seguridad para la impresión */
        }

        h1 { 
            font-size: 45pt; /* Tamaño enorme para compensar el achique */
            border-bottom: 6px solid #000; 
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .info-header { 
            font-size: 22pt; 
            margin-bottom: 50px; 
            font-weight: bold;
        }

        .list-container { width: 100%; }

        /* Cada línea de producto */
        .product-row {
            font-family: 'Courier New', monospace;
            font-size: 24pt; /* Fuente muy grande para que sea legible en depósito */
            padding: 20px 0;
            border-bottom: 2px solid #eee;
            width: 100%;
            display: block;
            white-space: nowrap; /* Evita que el código y el producto se separen en dos líneas */
        }

        .footer {
            margin-top: 50px;
            border-top: 3px solid #000;
            padding-top: 20px;
            font-size: 18pt;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="info-header">
            CONTROL DE LOGÍSTICA | Fecha: <span id="fecha"></span>
        </div>

        <div id="items-list" class="list-container">
            </div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        // Fecha actual
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const rawData = params.get('data');
        const container = document.getElementById('items-list');

        if (rawData) {
            // Cambié el separador a ";" porque es el que usas en tu módulo de Make 
            const items = decodeURIComponent(rawData).split(';');
            items.forEach(item => {
                if(item.trim() !== "") {
                    const row = document.createElement('div');
                    row.className = 'product-row';
                    row.textContent = item.trim();
                    container.appendChild(row);
                }
            });
        }
    </script>
</body>
</html>
