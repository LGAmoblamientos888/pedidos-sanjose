<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos la altura fija. El body medirá lo que midan los pedidos */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #fff;
            font-family: Arial, sans-serif;
            width: 100%;
        }

        /* Contenedor sin altura, solo ancho de seguridad */
        .content-area {
            width: 180mm; /* Dejamos margen lateral para que no toque los bordes */
            margin: 0 auto;
            padding-top: 20px;
        }

        h1 { 
            font-size: 22pt; 
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .item {
            font-family: 'Courier New', monospace;
            font-size: 14pt;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #000;
        }

        .footer {
            margin-top: 30px;
            padding-top: 10px;
            border-top: 1px solid #000;
            text-align: center;
            font-size: 10pt;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="content-area">
        <h1>RETIROS SAN JOSÉ</h1>
        <div id="listado"></div>
        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO MONTEVIDEO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            const items = decodeURIComponent(data).split('|');
            const container = document.getElementById('listado');
            items.forEach(text => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = text;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
