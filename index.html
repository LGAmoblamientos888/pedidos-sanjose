<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @page { size: A4; margin: 0; }

        body { 
            width: 794px; /* Ancho exacto A4 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #333;
        }

        .container {
            width: 794px;
            padding: 40px;
            min-height: 1122px;
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 5px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { font-size: 32px; color: #000; text-transform: uppercase; }
        .date { font-size: 18px; margin-top: 5px; color: #666; }

        /* CADA ITEM ES UN BLOQUE RÍGIDO */
        .pedido-card {
            display: block;
            width: 100%;
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 15px 20px;
            border-left: 8px solid #000;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            page-break-inside: avoid; /* Evita que un pedido se parta entre dos hojas */
        }

        .footer {
            margin-top: auto;
            border-top: 2px solid #ccc;
            padding-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RETIROS SAN JOSÉ</h1>
            <div class="date">Logística | <span id="current-date"></span></div>
        </div>

        <div id="lista-pedidos"></div>

        <div class="footer">
            LG Amoblamientos - Documento de Control de Depósito
        </div>
    </div>

    <script>
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const rawData = params.get('data') || "";
        
        // Esta regex separa por coma, punto y coma o saltos de línea
        const pedidos = decodeURIComponent(rawData).split(/[,;]+/);
        const contenedor = document.getElementById('lista-pedidos');

        pedidos.forEach(p => {
            const texto = p.trim();
            if (texto.length > 2) {
                const div = document.createElement('div');
                div.className = 'pedido-card';
                div.textContent = texto;
                contenedor.appendChild(div);
            }
        });
    </script>
</body>
</html>
