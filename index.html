<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiros San José</title>
    <style>
        /* 1. Forzar tamaño A4 físico */
        @page { 
            size: A4; 
            margin: 0; 
        }
        body { 
            font-family: Arial, sans-serif; 
            background-color: white; 
            color: black; 
            margin: 0; 
            padding: 0;
            /* Asegura que el cuerpo ocupe toda la hoja */
            width: 210mm;
            min-height: 297mm;
        }
        .page-container {
            padding: 1.5cm;
            box-sizing: border-box;
        }
        
        h1 { 
            font-size: 20pt; 
            text-transform: uppercase; 
            border-bottom: 2px solid black; 
            margin: 0 0 5pt 0;
        }
        .info-header { font-size: 10pt; margin-bottom: 25pt; }

        /* Estilo de lista más compacto y profesional */
        .fila { 
            border-bottom: 1px solid #000; 
            padding: 8pt 0; 
            font-size: 11pt;
            display: flex;
        }

        .footer { 
            position: absolute; 
            bottom: 1.5cm; 
            width: 180mm;
            font-size: 9pt; 
            border-top: 1px solid black; 
            padding-top: 5pt; 
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="info-header">
            <strong>DOCUMENTO DE CONTROL INTERNO</strong> <br>
            Generado el: <span id="fecha"></span> 
        </div>

        <div id="lista-contenedora">
            </div>

        <div class="footer">
            LG Amoblamientos - Gestión de Logística Automática 
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString();

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (rawData) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(rawData).split(',');

            pedidos.forEach(pedido => {
                const div = document.createElement('div');
                div.className = 'fila';
                div.textContent = pedido;
                contenedor.appendChild(div);
            });
        } else {
            contenedor.innerHTML = "<p>No hay datos pendientes.</p>";
        }
    </script>
</body>
</html>
