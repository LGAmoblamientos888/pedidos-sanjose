<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Bloqueo de scroll y márgenes */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            background: #fff;
            overflow: hidden;
            width: 210mm;
            height: 297mm;
        }

        @page { size: A4; margin: 0; }

        /* EL HACK: Reducimos la escala al 80%. 
           iLovePDF lo agrandará y quedará perfecto. */
        .page-container {
            width: 210mm;
            height: 297mm;
            padding: 15mm 20mm;
            box-sizing: border-box;
            transform: scale(0.85); 
            transform-origin: top left;
            display: flex;
            flex-direction: column;
        }

        h1 { 
            font-family: 'Helvetica', sans-serif;
            font-size: 32pt; 
            font-weight: 900;
            border-bottom: 5px solid #000;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .lista-pedidos { flex-grow: 1; }

        .fila-pedido {
            font-family: 'Courier New', monospace;
            font-size: 18pt; /* Tamaño grande compensado por el scale 0.85 */
            font-weight: bold;
            padding: 12px 0;
            border-bottom: 1px solid #ccc;
            white-space: nowrap; /* Evita que el texto se vaya abajo */
        }

        .footer {
            border-top: 2px solid #000;
            padding-top: 15px;
            text-align: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 12pt;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div class="lista-pedidos" id="render">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO MONTEVIDEO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rawData = params.get('data');
        if (rawData) {
            const items = decodeURIComponent(rawData).split('|');
            const container = document.getElementById('render');
            items.forEach(item => {
                if(item.trim().length > 0) {
                    const div = document.createElement('div');
                    div.className = 'fila-pedido';
                    div.textContent = item.trim();
                    container.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
