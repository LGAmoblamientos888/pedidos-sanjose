<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #eee; }

        /* La Hoja Teórica A4 */
        .canvas {
            width: 210mm;
            height: 297mm;
            background: white;
            position: relative;
            overflow: hidden;
            border: 5px solid red; /* Si no ves este borde rojo, iLovePDF está recortando */
        }

        /* Regla Superior */
        .regla-h {
            position: absolute;
            top: 0; left: 0; width: 210mm; height: 10mm;
            background: repeating-linear-gradient(90deg, #000 0, #000 1px, transparent 1px, transparent 10mm);
            border-bottom: 1px solid black;
        }

        /* Regla Lateral */
        .regla-v {
            position: absolute;
            top: 0; left: 0; width: 10mm; height: 297mm;
            background: repeating-linear-gradient(0deg, #000 0, #000 1px, transparent 1px, transparent 10mm);
            border-right: 1px solid black;
        }

        .info {
            position: absolute;
            top: 50mm;
            left: 50mm;
            font-family: monospace;
            font-size: 14pt;
        }

        .test-box {
            width: 100mm;
            height: 100mm;
            border: 2px solid blue;
            position: absolute;
            top: 20mm;
            left: 20mm;
            display: flex;
            align-items: center;
            justify-content: center;
            color: blue;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="regla-h"></div>
        <div class="regla-v"></div>
        
        <div class="test-box">CUADRO DE 10cm x 10cm</div>

        <div class="info">
            <h2>TEST DE CALIBRACIÓN</h2>
            <p>1. Si el borde rojo no se ve: iLovePDF añade márgenes externos.</p>
            <p>2. Si el cuadro azul no mide 10cm: iLovePDF está aplicando Zoom.</p>
            <p>3. Datos recibidos: <span id="debug-data"></span></p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('debug-data').textContent = params.get('data') || "Sin datos";
    </script>
</body>
</html>
