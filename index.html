<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset absoluto */
        * { margin: 0; padding: 0; }
        
        body { 
            background: #fff;
            font-family: Arial, sans-serif;
            /* NO usamos flex ni centrado aquí para evitar el efecto "miniatura" */
        }

        /* Esta tabla actúa como nuestra "hoja" */
        .tabla-principal {
            width: 700px; /* Ancho de seguridad total */
            margin: 0 auto; /* Centrado simple */
            border-collapse: collapse;
        }

        .header-spacer { height: 40px; } /* Margen superior real */

        h1 { 
            font-size: 26pt; 
            font-weight: bold;
            border-bottom: 5px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-family: sans-serif;
        }

        .item-fila {
            font-family: 'Courier New', monospace;
            font-size: 15pt;
            font-weight: bold;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            color: #000;
        }

        .footer {
            padding-top: 30px;
            text-align: center;
            font-size: 11pt;
            font-weight: bold;
            border-top: 2px solid #000;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <table class="tabla-principal">
        <tr><td class="header-spacer"></td></tr>
        <tr>
            <td>
                <h1>RETIROS SAN JOSÉ</h1>
                <div id="render-target">
                    </div>
                <div class="footer">
                    LG AMOBLAMIENTOS - DEPÓSITO
                </div>
            </td>
        </tr>
    </table>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            const items = decodeURIComponent(data).split('|');
            const container = document.getElementById('render-target');
            items.forEach(text => {
                if(text.trim()){
                    const div = document.createElement('div');
                    div.className = 'item-fila';
                    div.textContent = text.trim();
                    container.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
