<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset agresivo: eliminamos cualquier interpretación del navegador */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            width: 210mm; 
            height: 297mm;
            overflow: hidden;
            background-color: white;
        }

        @page { 
            size: A4; 
            margin: 0; 
        }

        /* Contenedor posicionado quirúrgicamente en el 0,0 de la hoja */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 210mm;
            height: 297mm;
            padding: 15mm; /* El margen lo manejamos nosotros por dentro */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .header {
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 24pt; font-family: Arial, sans-serif; font-weight: bold; }

        ul { list-style: none; width: 100%; }

        li {
            font-family: 'Courier New', monospace;
            font-size: 14pt;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .footer {
            margin-top: auto; /* Empuja al final */
            border-top: 1px solid #000;
            padding-top: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 10pt;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>RETIROS SAN JOSÉ</h1>
        </div>

        <div id="main-content">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - LOGÍSTICA
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            document.getElementById('main-content').innerHTML = decodeURIComponent(data);
        }
    </script>
</body>
</html>
