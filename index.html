<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page { 
            size: A4 portrait; 
            margin: 0; 
        }
        
        * { box-sizing: border-box; }
        
        html, body {
            width: 210mm;
            height: 297mm;
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Corta de raíz la creación de la página 2 */
        }

        .contenedor-a4 {
            width: 210mm;
            height: 296mm; /* 1mm menos para absorber el margen de error de iLovePDF */
            padding: 15mm;
            position: relative; /* Clave para anclar el footer */
        }

        h1 {
            font-size: 24pt;
            font-weight: 900;
            border-bottom: 3px solid #000;
            margin: 0 0 10mm 0;
            padding-bottom: 5mm;
            letter-spacing: -1px;
        }

        .item-retiro {
            font-family: 'Courier New', monospace;
            font-size: 14pt;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            padding: 4mm 0;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Si el código es enorme, le pone "..." en vez de desarmar la hoja */
        }

        .footer {
            position: absolute;
            bottom: 15mm;
            left: 15mm;
            width: 180mm; /* 210mm - 30mm de padding lateral */
            border-top: 1px solid #000;
            padding-top: 5mm;
            text-align: center;
            font-size: 10pt;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="contenedor-a4">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="lista-pedidos">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - SISTEMA DE CONTROL LOGÍSTICO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let rawData = params.get('data') || "";
        
        // Hack: Limpieza radical de la basura estructural (comillas, \n, \r)
        rawData = decodeURIComponent(rawData).replace(/["\n\r]/g, '');
        
        const items = rawData.split('|');
        const container = document.getElementById('lista-pedidos');
        
        items.forEach(texto => {
            const limpio = texto.trim();
            if(limpio.length > 0 && limpio !== ",") {
                // Eliminar comas residuales al principio del string si quedaron
                const finalStr = limpio.startsWith(',') ? limpio.substring(1).trim() : limpio;
                
                const div = document.createElement('div');
                div.className = 'item-retiro';
                div.textContent = finalStr;
                container.appendChild(div);
            }
        });
    </script>
</body>
</html>
