<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset total para evitar que iLovePDF adivine márgenes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @page { size: A4; margin: 0; }

        html, body { 
            width: 210mm; 
            height: 297mm; 
            background: #ffffff; 
            overflow: hidden; /* Evita estrictamente la página 2 */
        }

        /* Contenedor principal que simula la hoja física */
        .page {
            width: 210mm;
            height: 297mm;
            padding: 15mm; /* Margen interno de seguridad para la impresora */
            display: flex;
            flex-direction: column;
            font-family: 'Helvetica', 'Arial', sans-serif;
        }

        h1 { 
            font-size: 24pt; 
            border-bottom: 3px solid #000; 
            padding-bottom: 5mm;
            margin-bottom: 5mm;
        }

        .meta { 
            font-size: 12pt; 
            margin-bottom: 15mm; 
        }

        /* Fila de producto optimizada para no cortarse */
        .item {
            font-family: 'Courier New', monospace;
            font-size: 13pt;
            padding: 8pt 0;
            border-bottom: 0.5pt solid #eee;
            width: 100%;
            white-space: nowrap; /* Impide que el texto baje a la siguiente línea */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer {
            margin-top: auto; /* Empuja el pie al final de la hoja */
            border-top: 1pt solid #000;
            padding-top: 5mm;
            font-size: 10pt;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="meta">
            <strong>CONTROL DE LOGÍSTICA</strong> | Fecha: <span id="fecha"></span> [cite: 82]
        </div>

        <div id="lista-contenedora">
            </div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida 
        </div>
    </div>

    <script>
        // Fecha en formato local Uruguay [cite: 82]
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (data) {
            const pedidos = decodeURIComponent(data).split(',');
            pedidos.forEach(p => {
                if(p.trim() !== "") {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.textContent = p.trim();
                    contenedor.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
