<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiros San José</title>
    <style>
        /* Configuración para A4 y Blanco y Negro */
        @page { size: A4; margin: 1cm; }
        body { 
            font-family: Arial, sans-serif; 
            background-color: white; 
            color: black; 
            margin: 0; 
            padding: 0; 
        }
        .container { width: 100%; }
        
        /* Encabezado Simple */
        h1 { 
            font-size: 22px; 
            text-transform: uppercase; 
            border-bottom: 2px solid black; 
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .info-header { font-size: 12px; margin-bottom: 20px; }

        /* Lista de facturas tipo Tabla */
        .tabla-pedidos { width: 100%; border-collapse: collapse; }
        .fila { 
            border-bottom: 1px solid black; 
            padding: 10px 5px; 
            display: flex; 
            justify-content: flex-start;
            font-size: 14px;
        }
        .nro { font-weight: bold; width: 80px; }
        .detalle { flex-grow: 1; }

        /* Ocultar elementos innecesarios en el PDF */
        .footer { margin-top: 30px; font-size: 10px; border-top: 1px dashed gray; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="info-header">
            <strong>Documento de Control Interno</strong><br>
            Generado el: <span id="fecha"></span>
        </div>

        <div id="lista-contenedora">
            </div>

        <div class="footer">
            LG Amoblamientos - Gestión de Logística Automática
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString();

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (rawData) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(rawData).split(',');

            pedidos.forEach(pedido => {
                const div = document.createElement('div');
                div.className = 'fila';
                div.innerHTML = `<span>${pedido}</span>`;
                contenedor.appendChild(div);
            });
        } else {
            contenedor.innerHTML = "<p>No hay datos pendientes.</p>";
        }
    </script>
</body>
</html>
