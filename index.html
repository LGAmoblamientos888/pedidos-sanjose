<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos cualquier margen base */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            background: #fff;
            overflow: hidden; /* Prohibido crear segunda página */
        }

        /* HACK DE COMPENSACIÓN:
           Subimos el contenido y lo movemos a la izquierda 
           para anular el margen que mete iLovePDF.
        */
        .main-wrapper {
            position: absolute;
            top: -35px;  /* Compensamos el margen superior */
            left: -35px; /* Compensamos el margen izquierdo */
            width: 210mm;
            height: 297mm;
            padding: 45px; /* Restauramos el margen visual interno */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 { 
            font-family: Arial, sans-serif; 
            font-size: 26pt; 
            border-bottom: 3px solid #000; 
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        table { width: 100%; border-collapse: collapse; }

        td {
            font-family: 'Courier New', monospace;
            font-size: 15pt;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .footer {
            margin-top: auto;
            border-top: 1px solid #000;
            padding-top: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 10pt;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="content">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - CONTROL DE LOGÍSTICA
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            document.getElementById('content').innerHTML = decodeURIComponent(data);
        }
    </script>
</body>
</html>
