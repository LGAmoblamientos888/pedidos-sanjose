<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 10mm; }
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff;
            color: #000;
        }
        .container { width: 100%; max-width: 190mm; margin: auto; }
        
        h1 { 
            font-size: 18pt; 
            margin: 0; 
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }
        .header-info { font-size: 10pt; margin: 5px 0 20px 0; }

        /* Usamos una tabla para evitar que los items se partan en dos líneas */
        table { width: 100%; border-collapse: collapse; }
        td { 
            padding: 8pt 0; 
            border-bottom: 1px solid #000; 
            font-size: 11pt; 
            font-family: 'Courier New', monospace;
            vertical-align: middle;
        }
        /* Esto evita que el texto se parta si la hoja parece "angosta" */
        .no-wrap { white-space: nowrap; }

        .footer { 
            margin-top: 30px; 
            font-size: 9pt; 
            border-top: 1px solid #000; 
            padding-top: 5px; 
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="header-info">
            <strong>CONTROL DE LOGÍSTICA</strong> | Fecha: <span id="fecha"></span>
        </div>

        <table>
            <tbody id="lista-contenedora">
                </tbody>
        </table>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (data) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(data).split(',');
            pedidos.forEach(p => {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.className = "no-wrap";
                td.textContent = p.trim();
                tr.appendChild(td);
                contenedor.appendChild(tr);
            });
        }
    </script>
</body>
</html>
