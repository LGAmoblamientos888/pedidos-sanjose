<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos cualquier margen que iLovePDF quiera inventar */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #fff;
        }

        /* Forzamos que la tabla sea el único contenedor */
        #tabla-pdf {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        /* El encabezado es una fila de la tabla para que no se mueva */
        .header-cell {
            padding: 40px 40px 20px 40px;
            border-bottom: 4px solid #000;
        }

        h1 { font-size: 24pt; margin: 0; }

        /* Cada factura es una fila con padding interno */
        td {
            padding: 12px 40px;
            font-family: 'Courier New', monospace;
            font-size: 16pt;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }

        .footer-cell {
            padding: 20px;
            text-align: center;
            font-size: 10pt;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <table id="tabla-pdf">
            <thead>
                <tr>
                    <th class="header-cell" align="left">
                        <h1>RETIROS SAN JOSÉ</h1>
                    </th>
                </tr>
            </thead>
            <tbody id="render-target">
                </tbody>
            <tfoot>
                <tr>
                    <td class="footer-cell">LG Amoblamientos - Gestión Logística</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            // Inyectamos directamente en el tbody
            document.getElementById('render-target').innerHTML = decodeURIComponent(data);
        }
    </script>
</body>
</html>
