<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* 1. Definimos el tamaño exacto que iLovePDF entiende como 'hoja' */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            width: 800px; /* Ancho real de una A4 a 96dpi */
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        .hoja {
            width: 800px;
            min-height: 1120px; /* Alto de una A4 */
            padding: 50px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h1 { 
            font-size: 32pt; 
            border-bottom: 5px solid #000; 
            margin-bottom: 10px;
            padding-bottom: 10px;
        }

        .fecha-info { font-size: 16pt; margin-bottom: 40px; }

        /* 2. Forzamos que CADA producto sea una fila completa */
        .item-logistica {
            display: block; /* Obliga a bajar de línea */
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 18pt;
            font-weight: bold;
            padding: 15px 0;
            border-bottom: 2px solid #eee;
            word-break: break-all; /* Por si el código es muy largo */
        }

        .footer {
            margin-top: auto; /* Lo empuja al final de la A4 */
            border-top: 3px solid #000;
            padding-top: 20px;
            text-align: center;
            font-size: 14pt;
        }
    </style>
</head>
<body>
    <div class="hoja">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="fecha-info">
            CONTROL DE LOGÍSTICA | <span id="fecha"></span>
        </div>

        <div id="contenedor-items">
            </div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const dataRaw = params.get('data');
        const lista = document.getElementById('contenedor-items');

        if (dataRaw) {
            // Usamos el separador que configuraste en Make (punto y coma)
            const productos = decodeURIComponent(dataRaw).split(';');
            productos.forEach(prod => {
                if(prod.trim() !== "") {
                    const div = document.createElement('div');
                    div.className = 'item-logistica';
                    div.textContent = prod.trim();
                    lista.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
