<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos cualquier margen elástico */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @page { 
            size: A4; 
            margin: 0; 
        }

        body { 
            width: 210mm; 
            height: 297mm; 
            background: #ffffff; 
            font-family: 'Helvetica', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* EL MARCO: Este recuadro le dice a iLovePDF exactamente dónde termina la hoja */
        .border-frame {
            width: 200mm;
            height: 287mm;
            border: 2px solid #000; /* Marco estructural */
            margin: 5mm;
            padding: 10mm;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .header {
            border-bottom: 4px solid #000;
            padding-bottom: 10mm;
            margin-bottom: 10mm;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1 { font-size: 28pt; font-weight: 900; letter-spacing: -1px; }
        .date-box { font-size: 14pt; font-weight: bold; }

        /* Lista de items */
        .content { flex-grow: 1; }

        .item-row {
            display: block;
            width: 100%;
            padding: 10pt 0;
            border-bottom: 1px solid #ddd;
            font-family: 'Courier New', monospace;
            font-size: 15pt;
            font-weight: bold;
            color: #000;
        }

        .footer {
            border-top: 2px solid #000;
            padding-top: 5mm;
            text-align: center;
            font-size: 10pt;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="border-frame">
        <div class="header">
            <h1>RETIROS SAN JOSÉ</h1>
            <div class="date-box" id="current-date"></div>
        </div>

        <div class="content" id="lista-pedidos">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - CONTROL DE LOGÍSTICA
        </div>
    </div>

    <script>
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const dataRaw = params.get('data') || "";
        
        // Separamos por coma o punto y coma
        const items = decodeURIComponent(dataRaw).split(/[,;]+/);
        const contenedor = document.getElementById('lista-pedidos');

        items.forEach(item => {
            const texto = item.trim();
            if (texto.length > 2) {
                const div = document.createElement('div');
                div.className = 'item-row';
                div.textContent = texto;
                contenedor.appendChild(div);
            }
        });
    </script>
</body>
</html>
