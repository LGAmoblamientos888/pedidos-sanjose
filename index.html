<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fff;
            font-family: Arial, sans-serif;
            width: 800px; /* Ancho fijo para que iLovePDF no lo mueva */
        }

        .hoja-final {
            width: 800px;
            padding: 40px 50px;
            min-height: 1050px; /* Altura aproximada de un A4 en px */
            display: flex;
            flex-direction: column;
        }

        h1 { 
            font-size: 32px; 
            font-weight: bold;
            border-bottom: 5px solid #000;
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .lista-pedidos {
            flex-grow: 1;
        }

        .item {
            font-family: 'Courier New', monospace;
            font-size: 20px; /* Letra grande para que se vea bien tras el zoom */
            font-weight: bold;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            color: #000;
        }

        .footer {
            margin-top: 30px;
            border-top: 2px solid #000;
            padding-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hoja-final">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="render" class="lista-pedidos">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO MONTEVIDEO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let data = params.get('data') || "";
        
        // Limpiamos los datos de ruidos de Make
        data = decodeURIComponent(data).replace(/["\n\r]/g, '');
        
        const container = document.getElementById('render');
        const items = data.split('|');
        
        items.forEach(text => {
            const limpio = text.trim();
            if(limpio.length > 0 && limpio !== ",") {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = limpio.startsWith(',') ? limpio.substring(1).trim() : limpio;
                container.appendChild(div);
            }
        });
    </script>
</body>
</html>
