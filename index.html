<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset para evitar escalas automáticas de iLovePDF */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @page { size: A4; margin: 0; }

        body { 
            width: 794px; /* Ancho real A4 */
            font-family: 'Helvetica', Arial, sans-serif;
            background: #ffffff;
            color: #000;
            line-height: 1.2;
        }

        .container {
            width: 794px;
            padding: 50px;
            min-height: 1122px;
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 4px solid #000;
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { font-size: 28pt; font-weight: 900; }
        .date { font-size: 14pt; color: #444; }

        /* Lista de pedidos sin recuadros grises */
        .pedido-row {
            display: block;
            width: 100%;
            padding: 12pt 0;
            border-bottom: 1px solid #000; /* Línea fina divisoria */
            font-family: 'Courier New', monospace;
            font-size: 16pt;
            font-weight: bold;
            color: #000;
        }

        .footer {
            margin-top: auto;
            border-top: 1px solid #eee;
            padding-top: 15px;
            text-align: center;
            font-size: 10pt;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RETIROS SAN JOSÉ</h1>
            <div class="date"><span id="current-date"></span></div>
        </div>

        <div id="lista-contenedora">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - SISTEMA DE CONTROL LOGÍSTICO
        </div>
    </div>

    <script>
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-UY');
        
        const params = new URLSearchParams(window.location.search);
        const dataRaw = params.get('data') || "";
        
        // Separamos por coma, punto y coma o lo que venga de Make
        const items = decodeURIComponent(dataRaw).split(/[,;]+/);
        const contenedor = document.getElementById('lista-contenedora');

        items.forEach(item => {
            const texto = item.trim();
            if (texto.length > 2) {
                const div = document.createElement('div');
                div.className = 'pedido-row';
                div.textContent = texto;
                contenedor.appendChild(div);
            }
        });
    </script>
</body>
</html>
