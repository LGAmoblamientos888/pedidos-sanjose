<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset total para que iLovePDF no tenga donde agarrarse */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            width: 100%;
            /* Quitamos el height: 297mm para que sea un flujo natural */
        }

        .hoja-virtual {
            /* Forzamos un ancho que iLovePDF considere "seguro" (aprox 160mm) */
            width: 80%; 
            margin-left: 10%; /* Esto centra el contenido manualmente */
            padding-top: 50px;
            padding-bottom: 50px;
        }

        h1 { 
            font-size: 26pt; 
            font-weight: 800;
            color: #000;
            border-bottom: 5px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .contenedor-lista {
            display: flex;
            flex-direction: column;
        }

        .item-retiro {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14pt;
            font-weight: bold;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            /* Evita que el texto largo fuerce un ancho mayor */
            word-break: break-all; 
            display: flex;
            justify-content: flex-start;
        }

        .footer {
            margin-top: 50px;
            padding-top: 15px;
            border-top: 2px solid #000;
            text-align: center;
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="hoja-virtual">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="target" class="contenedor-lista">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO MONTEVIDEO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            // Usamos el pipe | para separar los elementos
            const items = decodeURIComponent(data).split('|');
            const target = document.getElementById('target');
            items.forEach(linea => {
                if(linea.trim()){
                    const div = document.createElement('div');
                    div.className = 'item-retiro';
                    div.textContent = linea.trim();
                    target.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
