<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #ffffff; 
        }
        /* Contenedor rígido con medidas A4 en píxeles */
        .hoja-a4 {
            width: 794px; 
            height: 1122px; 
            padding: 40px;
            box-sizing: border-box;
            position: relative; /* Clave para anclar el pie de página */
            font-family: Arial, sans-serif;
            color: #000;
        }
        h1 { 
            font-size: 24px; 
            border-bottom: 2px solid #000; 
            margin: 0 0 10px 0; 
            padding-bottom: 5px; 
        }
        .header-info { 
            font-size: 14px; 
            margin-bottom: 30px; 
        }
        /* Volvemos a divs simples pero forzamos que no se partan */
        .fila {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #000;
            white-space: nowrap; 
            overflow: hidden;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            font-size: 12px;
            border-top: 1px solid #000;
            padding-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hoja-a4">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="header-info">
            <strong>CONTROL DE LOGÍSTICA</strong> | Fecha: <span id="fecha"></span>
        </div>

        <div id="lista-contenedora"></div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (data) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(data).split(',');
            pedidos.forEach(p => {
                const div = document.createElement('div');
                div.className = 'fila';
                div.textContent = p.trim();
                contenedor.appendChild(div);
            });
        }
    </script>
</body>
</html>
