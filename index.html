<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Forzamos medidas físicas que iLovePDF entienda sin errores */
        @page { size: A4; margin: 0; }
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #ffffff; 
            width: 210mm; 
            height: 296mm; /* Un mm menos para evitar la 2da hoja */
            overflow: hidden; 
        }
        .sheet {
            padding: 15mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        h1 { 
            font-family: Arial, sans-serif; 
            font-size: 22pt; 
            margin: 0; 
            border-bottom: 3px solid #000; 
        }
        .info { 
            font-family: Arial, sans-serif; 
            font-size: 10pt; 
            margin: 5pt 0 20pt 0; 
        }
        .item { 
            font-family: 'Courier New', monospace; /* Fuente tipo factura, muy legible */
            font-size: 12pt; 
            padding: 8pt 0; 
            border-bottom: 1px solid #000; 
        }
        .footer { 
            margin-top: auto; 
            font-family: Arial, sans-serif; 
            font-size: 9pt; 
            border-top: 1px solid #000; 
            padding-top: 5pt; 
        }
    </style>
</head>
<body>
    <div class="sheet">
        <h1>RETIROS SAN JOSÉ</h1>
        <div class="info">
            <strong>CONTROL DE LOGÍSTICA</strong> | Fecha: <span id="fecha"></span>
        </div>

        <div id="lista-contenedora">
            </div>

        <div class="footer">
            LG Amoblamientos - Reporte Automático de Salida
        </div>
    </div>

    <script>
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-UY');
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        const contenedor = document.getElementById('lista-contenedora');

        if (data) {
            contenedor.innerHTML = "";
            const pedidos = decodeURIComponent(data).split(',');
            pedidos.forEach(p => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = p.trim();
                contenedor.appendChild(div);
            });
        }
    </script>
</body>
</html>
