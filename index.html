<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiros San Jose</title>
    <style>
        /* 1. RESET Y BLOQUEO DE ZOOM EN CHROMIUM */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @page {
            size: A4 portrait;
            margin: 0; 
        }

        body {
            background: #fff;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            font-family: Arial, sans-serif;
            overflow-x: hidden; /* Prohibido desbordar a los lados */
        }

        .contenedor {
            width: 210mm;
            padding: 20mm 15mm;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .item {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px dashed #999;
            color: #000;
            /* 2. ANTI-ZOOM: Obligamos a romper la palabra antes que ensanchar la hoja */
            overflow-wrap: break-word;
            word-wrap: break-word;
            white-space: normal;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>RETIROS SAN JOSÉ</h1>
        <div id="render"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let rawData = params.get('data') || "";
        
        // 3. LA ASPIRADORA DE DATOS
        // Destruimos la basura de formato que inyecta Make por los saltos de línea
        let cleanData = decodeURIComponent(rawData)
            .replace(/"/g, '')     // Fuera comillas
            .replace(/\n/g, ' ')   // Convierte saltos de linea reales en espacios
            .replace(/\r/g, '')    // Fuera retornos de carro
            .replace(/ +/g, ' ');  // Unifica espacios dobles
            
        const container = document.getElementById('render');
        const items = cleanData.split('|');
        
        items.forEach(item => {
            let textoLimpio = item.trim();
            
            // Si Make dejó una coma huérfana al principio, la borramos
            if (textoLimpio.startsWith(',')) {
                textoLimpio = textoLimpio.substring(1).trim();
            }

            if (textoLimpio.length > 2) {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = textoLimpio;
                container.appendChild(div);
            }
        });
    </script>
</body>
</html>
