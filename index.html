<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Eliminamos CUALQUIER espacio que iLovePDF quiera meter por defecto */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            width: 794px; 
            height: 1123px;
            overflow: hidden; /* Prohibido crear segunda página */
            background-color: #fff;
        }

        /* El contenedor que fuerza el inicio en el pixel 0,0 */
        .a4-container {
            width: 794px;
            height: 1123px;
            padding: 30px; /* Margen interno nuestro */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1 { 
            font-family: Arial, sans-serif; 
            font-size: 24pt; 
            margin-bottom: 5px; 
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
        }

        td {
            font-family: 'Courier New', monospace;
            font-size: 14pt;
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            color: #000;
        }

        .footer {
            margin-top: auto; /* Empuja al fondo de la hoja */
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 10pt;
            border-top: 1px solid #000;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="a4-container">
        <h1>RETIROS SAN JOSÉ</h1>
        
        <div id="render-target">
            </div>

        <div class="footer">
            LG AMOBLAMIENTOS - DEPÓSITO
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            document.getElementById('render-target').innerHTML = decodeURIComponent(data);
        }
    </script>
</body>
</html>
